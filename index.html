<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuminaMail</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--bg4:#202533;--border:#2a2f3f;--border2:#353b4f;--accent:#4f8ef7;--accent2:#7ab3ff;--accent-glow:rgba(79,142,247,.18);--text:#e8ecf5;--text2:#9aa3bb;--text3:#5a6380;--danger:#f76f6f;--success:#52d08a;--sidebar-w:220px;--toolbar-h:48px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--radius:8px;--tr:.18s cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* AUTH */
#auth{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;animation:fadeIn .4s}
#auth.gone{display:none}
.card{width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.6);animation:slideUp .4s cubic-bezier(.22,1,.36,1)}
.alogo{padding:28px 32px 22px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.alogo-icon{width:40px;height:40px;background:linear-gradient(135deg,#4f8ef7,#7ab3ff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.alogo-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.alogo-sub{font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.atabs{display:flex;border-bottom:1px solid var(--border)}
.atab{flex:1;padding:13px;text-align:center;cursor:pointer;color:var(--text3);font-weight:500;font-size:13px;border-bottom:2px solid transparent;transition:var(--tr)}
.atab.on{color:var(--accent);border-bottom-color:var(--accent)}
.atab:hover:not(.on){color:var(--text2)}
.abody{padding:26px 32px 30px}
.apanel{display:none}.apanel.on{display:block}
.fr{margin-bottom:16px}
.fr label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:.3px}
.fr input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:var(--tr)}
.fr input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.fr input::placeholder{color:var(--text3)}
.namegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.eprev{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-family:var(--mono);font-size:13px;color:var(--accent2);margin-top:8px;min-height:38px;display:flex;align-items:center;word-break:break-all}
.btn-p{width:100%;padding:11px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,#4f8ef7,#3a74e0);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:var(--tr);box-shadow:0 4px 16px rgba(79,142,247,.3)}
.btn-p:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(79,142,247,.4)}
.btn-p:disabled{opacity:.55;cursor:not-allowed}
.amsg{margin-top:13px;padding:9px 13px;border-radius:var(--radius);font-size:13px;display:none}
.amsg.err{display:block;background:rgba(247,111,111,.1);border:1px solid rgba(247,111,111,.3);color:var(--danger)}
.amsg.ok{display:block;background:rgba(82,208,138,.1);border:1px solid rgba(82,208,138,.3);color:var(--success)}
/* APP */
#app{height:100%;display:flex;flex-direction:column;opacity:0;transition:opacity .3s}
#app.vis{opacity:1}
/* TOOLBAR */
.bar{height:var(--toolbar-h);min-height:var(--toolbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:4px;flex-shrink:0;z-index:10}
.barlogo{display:flex;align-items:center;gap:8px;padding:0 8px;margin-right:6px}
.barlogo-i{width:26px;height:26px;background:linear-gradient(135deg,#4f8ef7,#7ab3ff);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.barlogo-t{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sep{width:1px;height:24px;background:var(--border);margin:0 4px;flex-shrink:0}
.tbtn{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);font-size:13px;transition:var(--tr);white-space:nowrap;flex-shrink:0}
.tbtn:hover{background:var(--bg3);color:var(--text)}
.tbtn svg{flex-shrink:0}
.ibtn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:var(--tr)}
.ibtn:hover{background:var(--bg3);color:var(--text)}
.bar-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.srch{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;transition:var(--tr);width:220px}
.srch:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);width:280px}
.srch input{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13px;flex:1;min-width:0}
.srch input::placeholder{color:var(--text3)}
.ubtn{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:20px;border:none;background:var(--bg3);cursor:pointer;transition:var(--tr)}
.ubtn:hover{background:var(--bg4)}
.uav{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#4f8ef7,#7ab3ff);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.uname{font-size:13px;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* BODY */
.abody2{flex:1;display:flex;overflow:hidden}
/* SIDEBAR */
.sb{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:8px 0;flex-shrink:0}
.sblabel{padding:8px 16px 4px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase}
.sbitem{display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer;transition:var(--tr);color:var(--text2);font-size:13px;position:relative;user-select:none}
.sbitem:hover{background:var(--bg3);color:var(--text)}
.sbitem.on{background:rgba(79,142,247,.12);color:var(--accent);font-weight:500}
.sbitem.on::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.sbitem svg{flex-shrink:0;opacity:.7}.sbitem.on svg{opacity:1}
.badge{margin-left:auto;min-width:20px;height:18px;background:var(--accent);color:#fff;border-radius:9px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
.div{height:1px;background:var(--border);margin:4px 0}
/* LIST PANE */
.lp{width:300px;min-width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.lph{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.lpht{font-size:15px;font-weight:600;letter-spacing:-.3px}
.lphc{font-size:12px;color:var(--text3);margin-left:6px}
.el{flex:1;overflow-y:auto}
.ei{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--tr);position:relative}
.ei:hover{background:var(--bg3)}
.ei.sel{background:rgba(79,142,247,.09);border-left:3px solid var(--accent)}
.ei.unr .ei-from{font-weight:600;color:var(--text)}
.ei.unr .ei-subj{font-weight:600;color:var(--text)}
.udot{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:var(--accent)}
.ei-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;gap:8px}
.ei-from{font-size:13px;font-weight:500;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.ei-time{font-size:11px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.ei-subj{font-size:13px;color:var(--text2);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ei-prev{font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px;padding:48px 32px}
.empty svg{opacity:.2}
.empty p{font-size:13px;text-align:center}
/* VIEW PANE */
.vp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}
.vtb{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;background:var(--bg2);flex-shrink:0}
#vca{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.vc{padding:28px 32px}
.vs{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:16px;line-height:1.3}
.vm{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:24px}
.mav{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#4f8ef7,#7ab3ff);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.mi{flex:1;min-width:0}
.mfrom{font-size:14px;font-weight:500}
.maddr{font-size:12px;color:var(--text3);font-family:var(--mono);word-break:break-all}
.mtime{font-size:12px;color:var(--text3);font-family:var(--mono);white-space:nowrap;flex-shrink:0}
.vbody{font-size:14px;line-height:1.8;color:var(--text2);white-space:pre-wrap;word-break:break-word}
.nosel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:16px;padding:32px;min-height:200px}
.nosel svg{opacity:.1}
.nosel p{font-size:14px}
/* COMPOSE */
.co{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:flex-end;padding:0 32px 32px 0;opacity:0;pointer-events:none;transition:opacity .2s}
.co.open{opacity:1;pointer-events:all}
.cw{width:560px;max-height:calc(100vh - 80px);background:var(--bg2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7);transform:translateY(40px) scale(.97);transition:.25s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column}
.co.open .cw{transform:translateY(0) scale(1)}
.ch{padding:12px 16px;background:linear-gradient(135deg,#192040,#1e2d50);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.cht{font-size:13px;font-weight:600;color:var(--text)}
.cx{width:24px;height:24px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:var(--tr);padding:0;line-height:1}
.cx:hover{background:var(--danger);color:#fff}
.cf{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.cf label{font-size:12px;color:var(--text3);min-width:38px;font-weight:500;flex-shrink:0}
.cf input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13px;min-width:0}
.cf input::placeholder{color:var(--text3)}
.cbody{padding:12px 16px;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:14px;resize:none;min-height:180px;flex:1;line-height:1.7;display:block;width:100%}
.cbody::placeholder{color:var(--text3)}
.cfoot{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg3);flex-shrink:0}
.bsend{display:flex;align-items:center;gap:6px;padding:8px 20px;border:none;border-radius:6px;background:linear-gradient(135deg,#4f8ef7,#3a74e0);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr);box-shadow:0 2px 8px rgba(79,142,247,.3);white-space:nowrap;flex-shrink:0}
.bsend:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,142,247,.4)}
.bsend:disabled{opacity:.65;cursor:not-allowed;transform:none!important}
/* NOTIFS */
.nc{position:fixed;top:58px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.notif{background:var(--bg2);border-radius:10px;padding:12px 16px;box-shadow:0 8px 32px rgba(0,0,0,.4);display:flex;align-items:center;gap:10px;font-size:13px;min-width:260px;max-width:380px;animation:nIn .3s cubic-bezier(.22,1,.36,1);pointer-events:all}
.notif.ok{border-left:3px solid var(--success);border:1px solid rgba(82,208,138,.3);border-left:3px solid var(--success)}
.notif.err{border:1px solid rgba(247,111,111,.3);border-left:3px solid var(--danger)}
.notif.inf{border:1px solid rgba(79,142,247,.3);border-left:3px solid var(--accent)}
.ni{font-size:15px;flex-shrink:0}
.nout{animation:nOut .25s ease forwards}
/* CTX */
.ctx{position:fixed;z-index:9000;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:4px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:175px;animation:fadeIn .12s ease}
.ci{padding:7px 12px;border-radius:5px;cursor:pointer;font-size:13px;color:var(--text2);transition:var(--tr);display:flex;align-items:center;gap:8px;user-select:none;white-space:nowrap}
.ci:hover{background:var(--bg3);color:var(--text)}
.ci.del:hover{background:rgba(247,111,111,.1);color:var(--danger)}
.cs{height:1px;background:var(--border);margin:4px 0}
.csmall{padding:5px 12px;font-size:11px;color:var(--text3);cursor:default;pointer-events:none}
/* ANIM */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes nIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes nOut{to{opacity:0;transform:translateX(16px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .65s linear infinite}
.ld{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:40px auto;display:block}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">
    <div class="alogo">
      <div class="alogo-icon">&#10022;</div>
      <div><div class="alogo-title">LuminaMail</div><div class="alogo-sub">LRGMail &middot; Lumina Communications</div></div>
    </div>
    <div class="atabs">
      <div class="atab on" onclick="switchTab('login')">Sign In</div>
      <div class="atab" onclick="switchTab('register')">Create Account</div>
    </div>
    <div class="abody">
      <div class="apanel on" id="pl">
        <div class="fr"><label>EMAIL ADDRESS</label><input type="email" id="le" placeholder="firstname.lastname@luminamail.com" autocomplete="email"/></div>
        <div class="fr"><label>PASSWORD</label><input type="password" id="lp" placeholder="Your password" autocomplete="current-password"/></div>
        <button class="btn-p" id="lb" onclick="doLogin()">Sign In to LuminaMail</button>
        <div class="amsg" id="lm"></div>
      </div>
      <div class="apanel" id="pr">
        <div class="fr"><label>YOUR NAME</label>
          <div class="namegrid">
            <input type="text" id="rf" placeholder="First name" oninput="updatePrev()"/>
            <input type="text" id="rl" placeholder="Last name" oninput="updatePrev()"/>
          </div>
        </div>
        <div class="fr"><label>YOUR LUMINA ADDRESS</label><div class="eprev" id="ep">enter your name above &#8593;</div></div>
        <div class="fr"><label>PASSWORD</label><input type="password" id="rp" placeholder="Min. 6 characters" autocomplete="new-password"/></div>
        <button class="btn-p" id="rb" onclick="doRegister()">Create My Account</button>
        <div class="amsg" id="rm"></div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="bar">
    <div class="barlogo"><div class="barlogo-i">&#10022;</div><div class="barlogo-t">LuminaMail</div></div>
    <div class="sep"></div>
    <button class="tbtn" onclick="openCompose({})">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-5"/><path d="M15 3l6 6-9 9H6v-6l9-9z"/></svg>New Mail
    </button>
    <button class="tbtn" onclick="replyEmail()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>Reply
    </button>
    <button class="tbtn" onclick="fwdEmail()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 014-4h12"/></svg>Forward
    </button>
    <div class="sep"></div>
    <button class="tbtn" onclick="delEmail()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>Delete
    </button>
    <button class="tbtn" onclick="togRead()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v12H4z"/><polyline points="22 6 12 13 2 6"/></svg>Mark Unread
    </button>
    <div class="bar-r">
      <div class="srch">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#5a6380" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search mail..." oninput="doSearch(this.value)"/>
      </div>
      <button class="ubtn" onclick="userMenu(event)" id="ubtn">
        <div class="uav" id="uav">?</div>
        <span class="uname" id="uname">...</span>
      </button>
    </div>
  </div>

  <div class="abody2">
    <div class="sb">
      <div class="sbitem on" id="n-inbox" onclick="setView('inbox')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
        Inbox <span class="badge" id="ibadge" style="display:none">0</span>
      </div>
      <div class="sbitem" id="n-sent" onclick="setView('sent')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Sent
      </div>
      <div class="sbitem" id="n-drafts" onclick="setView('drafts')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Drafts
      </div>
      <div class="sbitem" id="n-trash" onclick="setView('trash')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>Trash
      </div>
      <div class="div"></div>
      <div class="sblabel">Account</div>
      <div class="sbitem" onclick="doSignOut()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
      </div>
    </div>

    <div class="lp">
      <div class="lph">
        <div><span class="lpht" id="ptitle">Inbox</span><span class="lphc" id="pcount"></span></div>
        <button class="ibtn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg></button>
      </div>
      <div class="el" id="elist"><div class="ld"></div></div>
    </div>

    <div class="vp">
      <div class="vtb" id="vtb" style="display:none">
        <button class="tbtn" onclick="replyEmail()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>Reply</button>
        <button class="tbtn" onclick="fwdEmail()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 014-4h12"/></svg>Forward</button>
        <button class="tbtn" onclick="delEmail()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>Delete</button>
        <button class="tbtn" onclick="togRead()" style="margin-left:auto"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v12H4z"/><polyline points="22 6 12 13 2 6"/></svg>Toggle Read</button>
      </div>
      <div id="vca"><div class="nosel"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M4 4h16v12H4z"/><polyline points="22 6 12 13 2 6"/></svg><p>Select an email to read</p></div></div>
    </div>
  </div>
</div>

<!-- COMPOSE -->
<div class="co" id="co">
  <div class="cw">
    <div class="ch"><span class="cht" id="ctitle">New Message</span><button class="cx" onclick="closeCompose()">&#10005;</button></div>
    <div class="cf"><label>To</label><input type="email" id="cto" placeholder="recipient@luminamail.com"/></div>
    <div class="cf"><label>Cc</label><input type="text" id="ccc" placeholder="optional"/></div>
    <div class="cf"><label>Subject</label><input type="text" id="csub" placeholder="Subject"/></div>
    <textarea class="cbody" id="cbody" placeholder="Write your message here..."></textarea>
    <div class="cfoot">
      <button class="bsend" id="bsend" onclick="sendEmail()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send
      </button>
      <button class="tbtn" onclick="saveDraft()">Save Draft</button>
      <button class="tbtn" onclick="closeCompose()" style="margin-left:auto">Discard</button>
    </div>
  </div>
</div>

<div class="nc" id="nc"></div>

<script type="module">
import { initializeApp }                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, signOut,
         onAuthStateChanged, updateProfile }                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, push, set, get,
         onValue, update, remove }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── CONFIG ── */
const fbApp = initializeApp({
  apiKey:            "AIzaSyBrl-5BVxW0uLWy_9Qiwp35458Md1wYIRE",
  authDomain:        "lr-fce08.firebaseapp.com",
  projectId:         "lr-fce08",
  storageBucket:     "lr-fce08.firebasestorage.app",
  messagingSenderId: "276281240577",
  appId:             "1:276281240577:web:8d2df416d038d2b19fa400",
  databaseURL:       "https://lr-fce08-default-rtdb.europe-west1.firebasedatabase.app"
});
const auth = getAuth(fbApp);
const db   = getDatabase(fbApp);

/* ── STATE ── */
let CU = null, VIEW = 'inbox', SELID = null, EMAILS = {}, SEARCH = '', unsub = null;

/* ── UTILS ── */
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const av   = s => String(s||'?').trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';
const fS   = ts => {
  if(!ts) return '';
  const d=new Date(ts),n=new Date();
  if(d.toDateString()===n.toDateString()) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(n-d<6*864e5) return d.toLocaleDateString([],{weekday:'short'});
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
};
const fL   = ts => ts ? new Date(ts).toLocaleString([],{weekday:'short',month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
const noHTML = () => `<div class="nosel"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M4 4h16v12H4z"/><polyline points="22 6 12 13 2 6"/></svg><p>Select an email to read</p></div>`;

/* ── SEND BUTTON ── */
const SICO = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
const btnReady   = () => { const b=document.getElementById('bsend'); b.disabled=false; b.innerHTML=SICO+' Send'; };
const btnSending = () => { const b=document.getElementById('bsend'); b.disabled=true;  b.innerHTML='<span class="spin">&#8635;</span>&nbsp;Sending...'; };

/* ── NOTIFICATIONS ── */
window.notif = (type, text) => {
  const icons={ok:'&#10003;',err:'&#10007;',inf:'&#9432;'};
  const c=document.getElementById('nc');
  const n=document.createElement('div');
  n.className=`notif ${type}`;
  n.innerHTML=`<span class="ni">${icons[type]||'&#9432;'}</span><span>${esc(text)}</span>`;
  c.appendChild(n);
  setTimeout(()=>{ n.classList.add('nout'); setTimeout(()=>n.remove(),300); },4000);
};

/* ── AUTH UI ── */
window.switchTab = t => {
  ['login','register'].forEach((x,i)=>{
    document.querySelectorAll('.atab')[i].classList.toggle('on',x===t);
    document.getElementById('p'+x[0]).classList.toggle('on',x===t);
  });
};
window.updatePrev = () => {
  const f=document.getElementById('rf').value.trim().toLowerCase().replace(/\s+/g,'');
  const l=document.getElementById('rl').value.trim().toLowerCase().replace(/\s+/g,'');
  document.getElementById('ep').textContent=(f||l)?`${f||'firstname'}.${l||'lastname'}@luminamail.com`:'enter your name above \u2191';
};
const amsg = (id,t,s) => { const e=document.getElementById(id); e.className=`amsg ${t}`; e.textContent=s; };

window.doRegister = async () => {
  const first=document.getElementById('rf').value.trim();
  const last =document.getElementById('rl').value.trim();
  const pass =document.getElementById('rp').value;
  if(!first||!last){ amsg('rm','err','Enter first and last name.'); return; }
  if(pass.length<6){ amsg('rm','err','Password needs 6+ characters.'); return; }
  const email=`${first.toLowerCase().replace(/\s+/g,'')}.${last.toLowerCase().replace(/\s+/g,'')}@luminamail.com`;
  const btn=document.getElementById('rb');
  btn.disabled=true; btn.textContent='Creating...';
  try {
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    const dn=`${first} ${last}`;
    await updateProfile(cred.user,{displayName:dn});
    // Store user profile
    await set(ref(db,`users/${cred.user.uid}`),{uid:cred.user.uid,email,displayName:dn,createdAt:Date.now()});
    // Email-to-UID index for fast delivery lookup
    const ekey=email.replace(/\./g,'_DOT_').replace(/@/g,'_AT_');
    await set(ref(db,`emailIndex/${ekey}`),cred.user.uid);
    amsg('rm','ok','Account created! Signing you in...');
  } catch(e){
    console.error('Registration error:', e);
    amsg('rm','err',e.code==='auth/email-already-in-use'?'That name is taken, try another.':e.message);
    btn.disabled=false; btn.textContent='Create My Account';
  }
};

window.doLogin = async () => {
  const email=document.getElementById('le').value.trim();
  const pass =document.getElementById('lp').value;
  if(!email||!pass){ amsg('lm','err','Enter email and password.'); return; }
  const btn=document.getElementById('lb');
  btn.disabled=true; btn.textContent='Signing in...';
  try { await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){ 
    console.error('Login error:', e);
    amsg('lm','err','Wrong email or password.'); 
    btn.disabled=false; btn.textContent='Sign In to LuminaMail'; 
  }
};

/* ── AUTH STATE ── */
onAuthStateChanged(auth,user=>{
  if(user){
    CU=user;
    document.getElementById('auth').classList.add('gone');
    document.getElementById('app').classList.add('vis');
    document.getElementById('uav').textContent=av(user.displayName||user.email);
    document.getElementById('uname').textContent=user.displayName||user.email;
    startDB();
  } else {
    CU=null; EMAILS={}; SELID=null;
    if(unsub){ unsub(); unsub=null; }
    document.getElementById('auth').classList.remove('gone');
    document.getElementById('app').classList.remove('vis');
    document.getElementById('lb').disabled=false;
    document.getElementById('lb').textContent='Sign In to LuminaMail';
  }
});

/* ── REALTIME DB ── */
function startDB(){
  if(unsub) unsub();
  unsub=onValue(ref(db,`mail/${CU.uid}`),snap=>{
    EMAILS=snap.val()||{};
    renderList();
    badge();
    if(SELID&&EMAILS[SELID]) renderView(SELID);
  },err=>{
    console.error('DB err:',err);
    notif('err','DB error: '+err.message);
  });
}

function badge(){
  const n=Object.values(EMAILS).filter(e=>e.folder==='inbox'&&!e.read).length;
  const b=document.getElementById('ibadge');
  b.style.display=n?'flex':'none'; b.textContent=n;
}

/* ── VIEWS ── */
window.setView=v=>{
  VIEW=v; SELID=null;
  document.querySelectorAll('.sbitem').forEach(i=>i.classList.remove('on'));
  const n=document.getElementById(`n-${v}`); if(n) n.classList.add('on');
  document.getElementById('ptitle').textContent=v[0].toUpperCase()+v.slice(1);
  document.getElementById('vtb').style.display='none';
  document.getElementById('vca').innerHTML=noHTML();
  renderList();
};
window.doSearch=q=>{ SEARCH=q.toLowerCase(); renderList(); };

function getFiltered(){
  let rows=Object.entries(EMAILS);
  switch(VIEW){
    case 'inbox':  rows=rows.filter(([,e])=>e.folder==='inbox');  break;
    case 'sent':   rows=rows.filter(([,e])=>e.folder==='sent');   break;
    case 'drafts': rows=rows.filter(([,e])=>e.folder==='draft');  break;
    case 'trash':  rows=rows.filter(([,e])=>e.folder==='trash');  break;
  }
  if(SEARCH) rows=rows.filter(([,e])=>
    (e.subject||'').toLowerCase().includes(SEARCH)||
    (e.from||'').toLowerCase().includes(SEARCH)||
    (e.fromName||'').toLowerCase().includes(SEARCH)||
    (e.body||'').toLowerCase().includes(SEARCH)
  );
  return rows.sort((a,b)=>(b[1].timestamp||0)-(a[1].timestamp||0));
}

function renderList(){
  const el=document.getElementById('elist');
  const rows=getFiltered();
  document.getElementById('pcount').textContent=rows.length?`(${rows.length})`:'';
  if(!rows.length){
    el.innerHTML='<div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M4 4h16v12H4z"/><polyline points="22 6 12 13 2 6"/></svg><p>Nothing here</p></div>';
    return;
  }
  el.innerHTML=rows.map(([id,e])=>{
    const unr=!e.read&&e.folder==='inbox';
    const sel=id===SELID;
    const from=e.folder==='sent'?`To: ${e.to}`:(e.fromName||e.from||'Unknown');
    return `<div class="ei${unr?' unr':''}${sel?' sel':''}" onclick="openEmail('${id}')" oncontextmenu="ctxMenu(event,'${id}')">
      <div class="ei-hd"><span class="ei-from">${esc(from)}</span><span class="ei-time">${fS(e.timestamp)}</span></div>
      <div class="ei-subj">${esc(e.subject||'(no subject)')}</div>
      <div class="ei-prev">${esc((e.body||'').replace(/\n/g,' ').slice(0,90))}</div>
      ${unr?'<div class="udot"></div>':''}
    </div>`;
  }).join('');
}

/* ── OPEN EMAIL ── */
window.openEmail=async id=>{
  SELID=id;
  const e=EMAILS[id]; if(!e) return;
  if(!e.read&&e.folder==='inbox') update(ref(db,`mail/${CU.uid}/${id}`),{read:true}).catch(()=>{});
  renderList(); renderView(id);
};
function renderView(id){
  const e=EMAILS[id]; if(!e) return;
  document.getElementById('vca').innerHTML=`<div class="vc">
    <div class="vs">${esc(e.subject||'(no subject)')}</div>
    <div class="vm">
      <div class="mav">${av(e.fromName||e.from)}</div>
      <div class="mi">
        <div class="mfrom">${esc(e.fromName||e.from||'Unknown')}</div>
        <div class="maddr">${esc(e.from||'')}</div>
        ${e.to?`<div class="maddr">To: ${esc(e.to)}</div>`:''}
      </div>
      <div class="mtime">${fL(e.timestamp)}</div>
    </div>
    <div class="vbody">${esc(e.body||'')}</div>
  </div>`;
  document.getElementById('vtb').style.display='flex';
}

/* ── COMPOSE ── */
window.openCompose=opts=>{
  const o=opts||{};
  document.getElementById('cto').value  =o.to||'';
  document.getElementById('ccc').value  =o.cc||'';
  document.getElementById('csub').value =o.subject||'';
  document.getElementById('cbody').value=o.body||'';
  document.getElementById('ctitle').textContent=o.title||'New Message';
  btnReady();
  document.getElementById('co').classList.add('open');
  setTimeout(()=>document.getElementById(o.to?'csub':'cto').focus(),160);
};
window.closeCompose=()=>{ document.getElementById('co').classList.remove('open'); btnReady(); };

window.replyEmail=()=>{
  if(!SELID) return;
  const e=EMAILS[SELID]; if(!e) return;
  openCompose({title:'Reply',to:e.from,
    subject:e.subject?.startsWith('Re:')?e.subject:`Re: ${e.subject||''}`,
    body:`\n\n────────────────────\nOn ${fL(e.timestamp)}, ${e.fromName||e.from} wrote:\n\n${e.body||''}`});
};
window.fwdEmail=()=>{
  if(!SELID) return;
  const e=EMAILS[SELID]; if(!e) return;
  openCompose({title:'Forward',
    subject:e.subject?.startsWith('Fwd:')?e.subject:`Fwd: ${e.subject||''}`,
    body:`\n\n────────────────────\nForwarded from ${e.fromName||e.from}:\n\n${e.body||''}`});
};

/* ── FIXED SEND EMAIL FUNCTION ── */
window.sendEmail=async()=>{
  const to     =document.getElementById('cto').value.trim();
  const subject=document.getElementById('csub').value.trim();
  const body   =document.getElementById('cbody').value;

  if(!to)               { notif('err','Enter a recipient.'); return; }
  if(!to.includes('@')) { notif('err','Invalid email address.'); return; }

  btnSending();

  try {
    const ts=Date.now();
    const emailId = push(ref(db, `mail/${CU.uid}`)).key;
    
    // Save to sender's Sent folder first
    await set(ref(db, `mail/${CU.uid}/${emailId}`), {
      from: CU.email,
      fromName: CU.displayName || CU.email,
      to: to,
      subject: subject || '(no subject)',
      body: body || '',
      timestamp: ts,
      folder: 'sent',
      read: true
    });

    // Find recipient
    let ruid = null;
    try {
      const usersSnap = await get(ref(db, 'users'));
      if (usersSnap.exists()) {
        usersSnap.forEach(childSnap => {
          const userData = childSnap.val();
          if (userData && userData.email && userData.email.toLowerCase() === to.toLowerCase()) {
            ruid = childSnap.key;
          }
        });
      }
    } catch(e) { 
      console.warn('Error finding user:', e); 
    }

    // Deliver to recipient if exists
    if (ruid) {
      const inboxId = push(ref(db, `mail/${ruid}`)).key;
      await set(ref(db, `mail/${ruid}/${inboxId}`), {
        from: CU.email,
        fromName: CU.displayName || CU.email,
        to: to,
        subject: subject || '(no subject)',
        body: body || '',
        timestamp: ts,
        folder: 'inbox',
        read: false
      });
      notif('ok', `Email delivered to ${to}`);
    } else {
      notif('inf', `Email sent. ${to} is not on LuminaMail yet.`);
    }

    closeCompose();
    notif('ok', 'Message sent successfully!');

  } catch(err){
    console.error('sendEmail error:', err);
    notif('err', 'Send failed: ' + (err.message || 'Unknown error'));
    btnReady();
  }
};

/* ── DRAFT ── */
window.saveDraft=async()=>{
  try {
    await set(push(ref(db,`mail/${CU.uid}`)),{
      from:CU.email,
      fromName:CU.displayName||CU.email,
      to:document.getElementById('cto').value,
      subject:document.getElementById('csub').value,
      body:document.getElementById('cbody').value,
      timestamp:Date.now(),
      read:true,
      folder:'draft'
    });
    notif('ok','Draft saved.'); 
    closeCompose();
  } catch(e){ 
    console.error('Draft error:', e);
    notif('err','Save failed: '+e.message); 
  }
};

/* ── DELETE / TOGGLE READ ── */
window.delEmail=async()=>{
  if(!SELID) return;
  const e=EMAILS[SELID]; if(!e) return;
  try {
    if(e.folder==='trash'){ 
      await remove(ref(db,`mail/${CU.uid}/${SELID}`)); 
      notif('ok','Permanently deleted.'); 
    } else { 
      await update(ref(db,`mail/${CU.uid}/${SELID}`),{folder:'trash'}); 
      notif('ok','Moved to Trash.'); 
    }
    SELID=null;
    document.getElementById('vtb').style.display='none';
    document.getElementById('vca').innerHTML=noHTML();
  } catch(err){ 
    console.error('Delete error:', err);
    notif('err','Delete failed: '+err.message); 
  }
};

window.togRead=async()=>{
  if(!SELID) return;
  const e=EMAILS[SELID]; if(!e) return;
  try { 
    await update(ref(db,`mail/${CU.uid}/${SELID}`),{read:!e.read}); 
    notif('inf',e.read?'Marked unread.':'Marked read.'); 
  } catch(err){ 
    console.error('Toggle read error:', err);
    notif('err',err.message); 
  }
};

window.doSignOut=async()=>{ 
  if(unsub){unsub();unsub=null;} 
  await signOut(auth).catch(()=>{}); 
};

/* ── CONTEXT MENU ── */
window.ctxMenu=(e,id)=>{
  e.preventDefault(); rmCtx();
  const em=EMAILS[id]; if(!em) return;
  const m=document.createElement('div'); m.className='ctx';
  const x=Math.min(e.clientX,window.innerWidth-190);
  const y=Math.min(e.clientY,window.innerHeight-170);
  m.style.cssText=`left:${x}px;top:${y}px`;
  m.innerHTML=`
    <div class="ci" onclick="openEmail('${id}');rmCtx()">&#128236; Open</div>
    <div class="ci" onclick="ctxR('${id}')">&#8617; Reply</div>
    <div class="ci" onclick="ctxF('${id}')">&#8618; Forward</div>
    <div class="cs"></div>
    <div class="ci" onclick="ctxTR('${id}')">&#9711; Mark as ${em.read?'unread':'read'}</div>
    <div class="cs"></div>
    <div class="ci del" onclick="ctxD('${id}')">&#128465; Delete</div>`;
  document.body.appendChild(m);
  setTimeout(()=>document.addEventListener('click',rmCtx,{once:true}),0);
};
window.rmCtx=()=>document.querySelectorAll('.ctx').forEach(m=>m.remove());
window.ctxR=id=>{ openEmail(id); setTimeout(replyEmail,80); rmCtx(); };
window.ctxF=id=>{ openEmail(id); setTimeout(fwdEmail,80);   rmCtx(); };
window.ctxTR=async id=>{ const e=EMAILS[id]; if(e) await update(ref(db,`mail/${CU.uid}/${id}`),{read:!e.read}).catch(()=>{}); rmCtx(); };
window.ctxD=async id=>{
  const e=EMAILS[id]; if(!e) return;
  try {
    if(e.folder==='trash') await remove(ref(db,`mail/${CU.uid}/${id}`));
    else await update(ref(db,`mail/${CU.uid}/${id}`),{folder:'trash'});
    if(SELID===id){ SELID=null; document.getElementById('vtb').style.display='none'; document.getElementById('vca').innerHTML=noHTML(); }
    notif('ok','Moved to Trash.');
  } catch(err){ notif('err',err.message); }
  rmCtx();
};

/* ── USER MENU ── */
window.userMenu=e=>{
  e.stopPropagation(); rmCtx();
  const r=document.getElementById('ubtn').getBoundingClientRect();
  const m=document.createElement('div'); m.className='ctx';
  m.style.cssText=`right:${window.innerWidth-r.right}px;top:${r.bottom+6}px;left:auto`;
  m.innerHTML=`<div class="csmall">${esc(CU?.email||'')}</div><div class="cs"></div>
    <div class="ci del" onclick="doSignOut();rmCtx()">&#9211; Sign Out</div>`;
  document.body.appendChild(m);
  setTimeout(()=>document.addEventListener('click',rmCtx,{once:true}),0);
};

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeCompose();
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){ e.preventDefault(); openCompose({}); }
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&document.getElementById('co').classList.contains('open')) sendEmail();
});
document.getElementById('lp').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('le').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('rp').addEventListener('keydown',e=>{ if(e.key==='Enter') doRegister(); });
document.getElementById('co').addEventListener('click',e=>{ if(e.target===document.getElementById('co')) closeCompose(); });
</script>
</body>
